<section id="faq" class="section-padding" style="background: var(--surface);">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="text-center mb-12" appScrollAnimate>
            <span class="badge badge-gold mb-4">Preguntas Frecuentes</span>
            <h2 class="section-title mb-4">Resolvemos tus dudas</h2>
            <p class="section-subtitle mx-auto">
                ¿Tienes preguntas? Aquí encontrarás respuestas a las consultas más comunes de nuestros clientes.
            </p>
        </div>

        <div class="space-y-3">
            @for (item of items; track item.question; let i = $index) {
            <div appScrollAnimate [class]="'delay-' + (i * 80 + 100)"
                class="rounded-xl overflow-hidden transition-all duration-200"
                style="border: 1.5px solid var(--border);"
                [style.border-color]="openIndex() === i ? 'var(--secondary)' : 'var(--border)'">
                <button (click)="toggle(i)"
                    class="w-full text-left flex items-center justify-between gap-4 p-5 border-none cursor-pointer transition-colors duration-200"
                    [style.background]="openIndex() === i ? 'rgba(197,160,89,0.04)' : 'var(--surface)'"
                    [attr.aria-expanded]="openIndex() === i">
                    <span class="font-semibold text-sm sm:text-base pr-2" style="color: var(--text);">
                        {{ item.question }}
                    </span>
                    <span
                        class="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center transition-transform duration-300"
                        style="background: var(--surface-2);"
                        [style.transform]="openIndex() === i ? 'rotate(45deg)' : 'rotate(0deg)'">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            style="color: var(--secondary);">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M12 5v14M5 12h14" />
                        </svg>
                    </span>
                </button>

                @if (openIndex() === i) {
                <div class="px-5 pb-5">
                    <p class="text-sm leading-relaxed" style="color: var(--text-muted);">{{ item.answer }}</p>
                </div>
                }
            </div>
            }
        </div>

    </div>
</section>
