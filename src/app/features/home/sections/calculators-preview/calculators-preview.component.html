<section id="calculadoras" class="section-padding gradient-primary">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="text-center mb-12" appScrollAnimate>
            <span class="badge mb-4"
                style="background: rgba(197,160,89,0.2); color: var(--secondary-light); border-color: rgba(197,160,89,0.3);">
                Herramientas Financieras
            </span>
            <h2 class="font-heading text-white mb-4"
                style="font-size: clamp(1.875rem, 4vw, 2.75rem); font-weight: 700;">
                Toma decisiones con datos
            </h2>
            <p class="text-base leading-relaxed"
                style="color: rgba(255,255,255,0.7); max-width: 520px; margin: 0 auto;">
                Herramientas financieras gratuitas para que calcules y planifiques con confianza.
            </p>
        </div>

        <div class="grid sm:grid-cols-3 gap-6 mb-10">
            @for (tool of tools; track tool.title; let i = $index) {
            <div appScrollAnimate [class]="'delay-' + (i * 150 + 100)"
                class="rounded-2xl p-7 group transition-all duration-300 cursor-pointer"
                style="background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(8px);"
                [routerLink]="'/calculadoras'">
                <div class="mb-4" style="font-size: 2rem;"><i [class]="tool.icon"></i></div>
                <h3 class="font-semibold text-white text-lg mb-2">{{ tool.title }}</h3>
                <p class="text-sm leading-relaxed" style="color: rgba(255,255,255,0.65);">{{ tool.description }}</p>
                <div class="mt-4 flex items-center gap-2 text-sm font-medium" style="color: var(--secondary-light);">
                    Ir a calculadora
                    <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            </div>
            }
        </div>

        <div class="text-center" appScrollAnimate>
            <a routerLink="/calculadoras" class="btn-primary text-base py-3 px-8">
                Ir a las calculadoras →
            </a>
        </div>

    </div>
</section>
