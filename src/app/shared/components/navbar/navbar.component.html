<nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
    [style.background]="isScrolled() ? 'var(--surface)' : 'transparent'"
    [style.boxShadow]="isScrolled() ? '0 2px 20px rgba(0,0,0,0.1)' : 'none'" role="navigation"
    aria-label="Navegación principal">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-[72px]">

            <!-- Logo -->
            <button (click)="scrollTo('hero')"
                class="flex items-center gap-2 cursor-pointer border-none bg-transparent p-0" aria-label="Ir al inicio">
                <img src="/logo.png" alt="Optima" class="h-10 w-auto object-contain"
                    [class.brightness-0]="!isScrolled()" [class.invert]="!isScrolled()" />
                <span class="hidden sm:block font-sans italic text-sm leading-tight tracking-wide"
                    [style.color]="isScrolled() ? 'var(--secondary)' : 'rgba(255,255,255,0.9)'">by Angie Céspedes</span>
            </button>

            <!-- Desktop links -->
            <div class="hidden md:flex items-center gap-1">
                @for (link of navLinks; track link.label) {
                @if (link.anchor) {
                <button (click)="scrollTo(link.anchor)"
                    class="px-3 py-2 rounded-md text-sm font-medium transition-all duration-200 cursor-pointer border-none bg-transparent"
                    [style.color]="isScrolled() ? 'var(--text-muted)' : 'rgba(255,255,255,0.85)'"
                    [class.hover:bg-white/10]="!isScrolled()">{{ link.label }}</button>
                } @else {
                <a [routerLink]="link.route"
                    class="px-3 py-2 rounded-md text-sm font-medium transition-all duration-200"
                    [style.color]="isScrolled() ? 'var(--text-muted)' : 'rgba(255,255,255,0.85)'">{{ link.label }}</a>
                }
                }
            </div>

            <!-- CTA + hamburger -->
            <div class="flex items-center gap-3">
                <a [href]="whatsappUrl" target="_blank" rel="noopener noreferrer"
                    class="hidden sm:inline-flex btn-primary text-sm py-2 px-4" aria-label="Contactar por WhatsApp">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path
                            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
                        <path
                            d="M12 0C5.373 0 0 5.373 0 12c0 2.123.555 4.113 1.524 5.836L0 24l6.336-1.502A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.007-1.373l-.36-.213-3.727.883.916-3.618-.234-.372A9.818 9.818 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z" />
                    </svg>
                    WhatsApp
                </a>

                <!-- Hamburger -->
                <button class="md:hidden p-2 rounded-md border-none bg-transparent cursor-pointer"
                    (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()" aria-label="Abrir menú">
                    <svg class="w-6 h-6" [style.color]="isScrolled() ? 'var(--text)' : '#fff'" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        @if (menuOpen()) {
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                        } @else {
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                        }
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile menu -->
    @if (menuOpen()) {
    <div class="md:hidden" style="background: var(--surface); border-top: 1px solid var(--border);">
        <div class="px-4 py-3 space-y-1">
            @for (link of navLinks; track link.label) {
            @if (link.anchor) {
            <button (click)="scrollTo(link.anchor)"
                class="w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium cursor-pointer border-none bg-transparent transition-colors"
                style="color: var(--text-muted);">{{ link.label }}</button>
            } @else {
            <a [routerLink]="link.route" (click)="menuOpen.set(false)"
                class="block px-4 py-2.5 rounded-lg text-sm font-medium transition-colors"
                style="color: var(--text-muted);">{{ link.label }}</a>
            }
            }
            <div class="pt-2 pb-1">
                <a [href]="whatsappUrl" target="_blank" rel="noopener noreferrer"
                    class="btn-primary w-full justify-center">WhatsApp</a>
            </div>
        </div>
    </div>
    }
</nav>
