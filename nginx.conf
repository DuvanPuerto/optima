server {
    listen       8080;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index    index.html index.htm;

    # index.html — never cache so browsers always fetch the latest shell
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Hashed assets (JS/CSS/fonts/images) — cache aggressively, filenames change on every build
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}